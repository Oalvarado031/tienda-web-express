<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Boutique Express</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<header th:fragment="header" class="header">
    <div class="header-contenido">
        <a th:href="@{/}" class="logo">
            <span class="logo-icono">B</span>
            <span class="logo-texto">Boutique <em>Express</em></span>
        </a>
        <nav class="menu">
            <a th:href="@{/}">Inicio</a>
            <a th:href="@{/catalogo}">Catalogo</a>
            <a th:href="@{/pedido}">Pedido</a>
        </nav>
        <div class="carrito-mini">
            <span id="contadorCarrito">0</span>
            <span class="carrito-label">items</span>
        </div>
    </div>
</header>

<footer th:fragment="footer" class="footer">
    <p>&copy; 2025 Boutique Express &middot; Moda con estilo</p>
    <p class="footer-sub">Hecho por Oscar Alvarado</p>
</footer>

<div th:fragment="scripts">
    <script th:src="@{/js/app.js}"></script>
</div>

</body>
</html>
