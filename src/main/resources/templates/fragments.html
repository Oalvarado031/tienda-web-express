<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Boutique Express</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- CSS personalizado -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-light">

<header th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" th:href="@{/}">
                <span class="logo-icono me-2">B</span>
                <span class="brand-text">Boutique <em class="text-acento">Express</em></span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuPrincipal">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/catalogo}">Catalogo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/buscar}">
                            <i class="bi bi-search"></i> Buscar
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/pedido}">Pedido</a>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a th:href="@{/carrito}" class="btn btn-outline-acento position-relative">
                            <i class="bi bi-bag"></i> Carrito
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                                  th:if="${totalItemsCarrito != null and totalItemsCarrito > 0}"
                                  th:text="${totalItemsCarrito}">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<footer th:fragment="footer" class="footer-tienda text-white text-center py-4 mt-5">
    <div class="container">
        <p class="mb-1">&copy; 2025 Boutique Express &middot; Moda con estilo</p>
        <p class="small mb-0 opacity-75">Hecho por Oscar Alvarado</p>
    </div>
</footer>

<div th:fragment="scripts">
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- JS personalizado -->
    <script th:src="@{/js/app.js}"></script>
</div>

</body>
</html>
