<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(${titulo})}"></head>
<body>

<header th:replace="~{fragments :: header}"></header>

<main class="contenedor">
    <a th:href="@{/catalogo}" class="volver">&larr; Volver al catalogo</a>

    <section class="detalle">
        <div class="detalle-img">
            <img th:src="@{'/images/' + ${producto.imagen}}"
                 th:alt="${producto.nombre}"
                 onerror="this.src='/images/placeholder.svg'">
        </div>

        <div class="detalle-info">
            <span class="badge" th:text="${producto.categoria.nombre}">Categoria</span>
            <h1 th:text="${producto.nombre}">Nombre del producto</h1>

            <p class="precio-grande">C$ <span th:text="${producto.precio}">0.00</span></p>

            <p class="disponibilidad"
               th:classappend="${producto.disponible} ? ' stock-ok' : ' stock-no'">
                <span th:if="${producto.disponible}">
                    En stock (<span th:text="${producto.stock}">0</span> unidades disponibles)
                </span>
                <span th:unless="${producto.disponible}">Producto agotado</span>
            </p>

            <h3>Descripcion</h3>
            <p class="detalle-descripcion" id="descripcionProducto"
               th:text="${producto.descripcion}">Descripcion del producto.</p>

            <div class="detalle-acciones">
                <button id="btnToggleDesc" class="btn-secundario">Ocultar descripcion</button>
                <a th:href="@{/pedido(productoId=${producto.id})}"
                   class="btn-principal"
                   th:classappend="${!producto.disponible} ? ' btn-deshabilitado' : ''">
                    Solicitar producto
                </a>
                <button class="btn-mini btn-agregar"
                        th:data-id="${producto.id}"
                        th:data-nombre="${producto.nombre}"
                        th:disabled="${!producto.disponible}">
                    Agregar al carrito
                </button>
            </div>
        </div>
    </section>
</main>

<div id="toast" class="toast"></div>

<footer th:replace="~{fragments :: footer}"></footer>
<div th:replace="~{fragments :: scripts}"></div>

</body>
</html>
