<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(${titulo})}"></head>
<body>

<header th:replace="~{fragments :: header}"></header>

<main class="container py-5">
    <a th:href="@{/catalogo}" class="text-decoration-none text-muted mb-3 d-inline-block">
        <i class="bi bi-arrow-left"></i> Volver al catalogo
    </a>

    <!-- Mensaje flash -->
    <div th:if="${mensajeCarrito}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-cart-check me-2"></i>
        <span th:text="${mensajeCarrito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="row g-0">
            <div class="col-12 col-md-6">
                <img th:src="@{'/images/' + ${producto.imagen}}"
                     th:alt="${producto.nombre}"
                     class="detalle-img"
                     onerror="this.src='/images/placeholder.svg'">
            </div>

            <div class="col-12 col-md-6">
                <div class="card-body p-4 p-md-5">
                    <span class="badge text-bg-light border mb-2 px-3 py-2"
                          th:text="${producto.categoria.nombre}">Categoria</span>

                    <h1 class="fw-bold" th:text="${producto.nombre}">Nombre del producto</h1>

                    <p class="precio-grande">C$ <span th:text="${producto.precio}">0.00</span></p>

                    <p class="mb-3">
                        <span class="badge px-3 py-2"
                              th:classappend="${producto.disponible} ? 'text-bg-success' : 'text-bg-danger'">
                            <span th:if="${producto.disponible}">
                                <i class="bi bi-check-circle"></i>
                                En stock (<span th:text="${producto.stock}">0</span> unidades)
                            </span>
                            <span th:unless="${producto.disponible}">
                                <i class="bi bi-x-circle"></i> Producto agotado
                            </span>
                        </span>
                    </p>

                    <h6 class="text-muted text-uppercase mt-4 mb-2">Descripcion</h6>
                    <p class="text-muted" id="descripcionProducto" th:text="${producto.descripcion}">
                        Descripcion del producto.
                    </p>

                    <!-- Form: agregar al carrito con cantidad seleccionable -->
                    <form th:action="@{/carrito/agregar}" method="post" class="mt-4">
                        <input type="hidden" name="productoId" th:value="${producto.id}">
                        <input type="hidden" name="volverA" th:value="'/producto/' + ${producto.id}">

                        <div class="row g-2 align-items-end mb-3">
                            <div class="col-4 col-md-3">
                                <label for="cantidad" class="form-label fw-semibold small mb-1">Cantidad</label>
                                <input type="number" id="cantidad" name="cantidad"
                                       class="form-control" value="1" min="1"
                                       th:max="${producto.stock}"
                                       th:disabled="${!producto.disponible}">
                            </div>
                            <div class="col-8 col-md-9">
                                <button type="submit" class="btn btn-acento w-100"
                                        th:disabled="${!producto.disponible}">
                                    <i class="bi bi-cart-plus"></i> Agregar al carrito
                                </button>
                            </div>
                        </div>
                    </form>

                    <div class="d-flex flex-wrap gap-2 mt-3">
                        <button id="btnToggleDesc" class="btn btn-outline-acento btn-sm">
                            Ocultar descripcion
                        </button>
                        <a th:href="@{/carrito}" class="btn btn-outline-acento btn-sm">
                            <i class="bi bi-bag"></i> Ver carrito
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
<div th:replace="~{fragments :: scripts}"></div>

</body>
</html>
