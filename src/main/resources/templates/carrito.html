<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(titulo=${titulo})}"></head>
<body>

<header th:replace="~{fragments :: header}"></header>

<main class="container py-5">
  <div class="text-center mb-4">
    <h1 class="fw-bold">Mi carrito</h1>
    <p class="text-muted">Revisa tus productos antes de confirmar el pedido</p>
  </div>

  <div th:if="${mensajeCarrito}" class="alert alert-success alert-dismissible fade show">
    <span th:text="${mensajeCarrito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- CARRITO VACIO -->
  <div th:if="${estaVacio}" class="text-center py-5">
    <p class="text-muted fs-5 mb-3">Tu carrito esta vacio</p>
    <a th:href="@{/catalogo}" class="btn btn-acento">Ir al catalogo</a>
  </div>

  <!-- CARRITO CON ITEMS -->
  <div th:if="${!estaVacio}">
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead class="table-light">
            <tr>
              <th class="ps-4">Producto</th>
              <th class="text-center">Precio</th>
              <th class="text-center">Cantidad</th>
              <th class="text-end">Subtotal</th>
              <th class="pe-4"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
              <td class="ps-4">
                <div class="d-flex align-items-center">
                  <img th:src="@{'/images/' + ${item.imagen}}"
                       th:alt="${item.nombre}"
                       style="width:60px; height:75px; object-fit:cover; border-radius:8px;"
                       onerror="this.src='/images/placeholder.svg'">
                  <div class="ms-3">
                    <h6 class="mb-0 fw-bold" th:text="${item.nombre}">Producto</h6>
                    <a th:href="@{'/producto/' + ${item.productoId}}"
                       class="small text-muted text-decoration-none">Ver detalle</a>
                  </div>
                </div>
              </td>
              <td class="text-center text-muted">
                C$ <span th:text="${item.precio}">0.00</span>
              </td>
              <td class="text-center">
                <form th:action="@{/carrito/actualizar}" method="post" class="d-inline">
                  <input type="hidden" name="productoId" th:value="${item.productoId}">
                  <input type="number" name="cantidad"
                         th:value="${item.cantidad}"
                         min="1" max="100"
                         class="form-control form-control-sm text-center mx-auto"
                         style="width:70px;"
                         onchange="this.form.submit()">
                </form>
              </td>
              <td class="text-end fw-bold" style="color: var(--color-acento-oscuro);">
                C$ <span th:text="${item.subtotal}">0.00</span>
              </td>
              <td class="pe-4 text-end">
                <form th:action="@{'/carrito/eliminar/' + ${item.productoId}}" method="post" class="d-inline">
                  <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                </form>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Resumen y acciones -->
    <div class="row g-3">
      <div class="col-12 col-md-7">
        <div class="d-flex gap-2 flex-wrap">
          <a th:href="@{/catalogo}" class="btn btn-outline-acento">Seguir comprando</a>
          <form th:action="@{/carrito/vaciar}" method="post"
                onsubmit="return confirm('Vaciar todo el carrito?');" class="d-inline">
            <button type="submit" class="btn btn-outline-danger">Vaciar carrito</button>
          </form>
        </div>
      </div>
      <div class="col-12 col-md-5">
        <div class="card border-0 shadow-sm">
          <div class="card-body">
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted">Subtotal:</span>
              <span>C$ <span th:text="${total}">0.00</span></span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted">Envio:</span>
              <span class="text-success">Gratis</span>
            </div>
            <hr>
            <div class="d-flex justify-content-between mb-3">
              <strong>Total:</strong>
              <strong style="color: var(--color-acento-oscuro); font-size: 1.3rem;">
                C$ <span th:text="${total}">0.00</span>
              </strong>
            </div>
            <form th:action="@{/carrito/finalizar}" method="post">
              <button type="submit" class="btn btn-acento w-100">
                Finalizar pedido
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
<div th:replace="~{fragments :: scripts}"></div>

</body>
</html>
